[package]
name = "messagebox-server"
version = "1.0.0"
edition = "2021"

[dependencies]
axum = { version = "0.8", features = ["json", "query"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "mysql", "chrono", "macros", "migrate"] }
tower-http = { version = "0.6", features = ["cors", "timeout", "limit"] }
tower = "0.5"
reqwest = { version = "0.12", features = ["json"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
dotenvy = "0.15"
hex = "0.4"
base64 = "0.22"
thiserror = "2"
parking_lot = "0.12"
signal-hook = "0.3"
form_urlencoded = "1"
async-trait = "0.1"
socketioxide = { version = "0.15", features = ["state"] }

# BRC-31 auth middleware — crates.io release
bsv-auth-axum-middleware = "0.1"

# bsv-sdk — sole SDK for all auth and wallet operations. Requirement relaxed to
# "0.2" so the local [patch.crates-io] path crate (bsv-sdk 0.2.82, the
# concurrency-safe Arc<Peer> fix on fix/brc103-concurrent-sessions) SATISFIES it
# and the patch actually applies. A "=0.2.85" pin would reject the 0.2.82 patch
# (semver: patch crate must satisfy the dep req) and silently fall back to the
# registry copy. bsv-auth-axum-middleware and bsv-wallet-toolbox both depend on
# bsv-sdk ^0.2, so all three still resolve to the single local copy.
bsv-sdk = { version = "0.2", features = ["network"] }

# Bumped to 0.2.24 (latest 0.2.x). Older 0.2.16 was written against a pre-0.2.82
# SDK where CertificateResult.keyring was a bare HashMap; 0.2.82 made it
# Option<HashMap>, so 0.2.16 failed to compile against the local patched SDK.
# 0.2.24 targets the newer SDK shape and still requires bsv-sdk "0.2" (satisfied
# by the local 0.2.82 patch).
bsv-wallet-toolbox = "0.2.24"

getrandom = "0.4"
http-body-util = "0.1"
rsa = { version = "0.9", features = ["sha2"] }
pkcs8 = { version = "0.10", features = ["pem"] }
sha2 = "0.10"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
hyper = { version = "1", features = ["full"] }
testcontainers = "0.27"
testcontainers-modules = { version = "0.15", features = ["mysql"] }
uuid = { version = "1", features = ["v4"] }

[profile.release]
opt-level = 3
lto = true

# Standalone package — not a member of the parent rust-mpc workspace.
# Without this, cargo walks up to rust-mpc/Cargo.toml and refuses to build.
[workspace]

# BRC-103 concurrency fix, sourced from git so this builds in CI/Docker without
# the local checkout. This server is the build root, so its [patch] applies
# graph-wide — pulling in both fixes and unifying bsv-sdk to one copy:
#   - bsv-sdk: Arc<Peer>-shareable, all-&self concurrency-safe SDK (0.2.86,
#     merged to main).
#   - bsv-auth-axum-middleware: lock-free verify/create, cert-gate TOCTOU fix,
#     SessionNotFound -> 401 (0.1.2, requires bsv-sdk 0.2.86).
# TEMP until bsv-sdk 0.2.86 + bsv-auth-axum-middleware 0.1.2 publish to crates.io,
# then switch these to plain version requirements and drop the [patch].
[patch.crates-io]
bsv-sdk = { git = "https://github.com/b1narydt/bsv-rust-sdk", branch = "main" }
bsv-auth-axum-middleware = { git = "https://github.com/b1narydt/bsv-auth-axum-middleware", branch = "fix/concurrent-arc-peer" }
